bloc3_structural:
  subsections:
    - heading: "Catégorie audit"
      body: |
        **STRUCTURAL_KILL via Sharpe sous kill rule + dominance benchmarks 2/2** : Low-vol anomaly produit Sharpe 0.49 cohérent avec littérature académique (Frazzini-Pedersen 2014 : 0.4-0.6 historique), MAIS strictement dominé par SPY cap-weighted et Equal-weight sur Sharpe + Calmar + CAGR. L'anomalie existe à l'état "défendable statistiquement" mais pas "supérieure au passif simple".
    - heading: "Pourquoi low-vol fail vs SPY 2019-2025"
      body: |
        Le résultat (Sharpe 0.49) est **dans la fourchette littéraire** (0.4-0.6). Donc l'implémentation est probablement correcte. Le fail vient du contexte 2019-2025 :

        - **Bull market tech-dominated** : NVDA +1500%, AAPL +400%, MSFT +200%, TSLA +800% — toutes high-vol
        - **Cap-weighted SPY capture cette concentration** (top 5 = ~25% poids)
        - **Low-vol bottom decile** = utilities/staples (XLU/XLP-ish stocks) qui ont eu rendements moyens 5-8% CAGR — sous-performent vs SPY 14%
        - **2022 bear** où low-vol traditionnellement outperforms : oui Sharpe sub-sample 2019-2022 +0.57 > équivalent ratio mais pas suffisant

        Pour que low-vol batte cap-weighted, il faudrait soit (a) régime bear prolongé (2008-2009 typique), (b) cycle de hausse rates qui pénalise tech (2022 partiel), (c) leverage low-vol portfolio (Frazzini-Pedersen Betting Against Beta utilise leverage pour scaler edge).
    - heading: "Survivorship bias caveat — pourrait être encore pire en réalité"
      body: |
        On a testé sur 486 stocks SP500 actuels (filter coverage ≥90%). Les vraies low-vol stocks qui ont sous-performé MASSIVEMENT et sont sorties de l'index ne sont pas dans notre univers. Donc :

        - Notre 486 = surviving SP500 = inclut tendance positive structurelle
        - Vraies low-vol historique inclurait stocks sortis (bankrupt, acquired, demerged)
        - Performance réelle low-vol historique vraisemblablement encore PLUS faible que notre Sharpe 0.49

        Conclusion : même avec biais survivorship qui devrait avantager low-vol, on ne bat pas SPY. Confirmation forte que low-vol anomaly est compressé sur cette ère.
    - heading: "21e data point — 9/9 classes d'edge ARCHIVED, pattern empirique inattaquable"
      body: |
        | Classe | Tests | Statut |
        |---|---:|---|
        | ICT canon-faithful | 3 | 3/3 ARCHIVED |
        | Momentum daily long-only (J&T + TSMOM) | 2 | 2/2 ARCHIVED |
        | Directional intraday continuation | 1 | 1/1 ARCHIVED |
        | Crypto basis/funding | 1 | 1/1 ARCHIVED |
        | Vol risk premium structural | 1 | 1/1 ARCHIVED |
        | Event-driven (PEAD) | 1 | 1/1 ARCHIVED |
        | Cross-asset allocation (Risk Parity) | 1 | 1/1 ARCHIVED |
        | Cross-sectional sector momentum | 1 | 1/1 ARCHIVED MARGINAL |
        | **Volatility anomaly (Low-Vol)** | 1 | **1/1 ARCHIVED clean** |

        **9/9 classes d'edge ARCHIVED. 21 data points cumulés**. Conclusion empirique structurelle inattaquable :

        > **Le périmètre "free retail data + univers US/crypto majeurs liquides + edge publics documentés équal-weight" est entièrement saturé.**

        S+3 livre ce qu'il devait livrer : épuisement disciplined de la dernière fenêtre de découverte free-data raisonnable.

