bloc3_structural:
  subsections:
    - heading: "Catégorie audit"
      body: |
        **MARGINAL → ARCHIVED via dominance benchmark partielle** : Sector momentum top-3 6m bat le benchmark equal-weight 11 sectors sur Sharpe (0.66 vs 0.59) et Calmar (0.38 vs 0.28), mais est strictement dominé par SPY buy-hold simple (Sharpe 0.73, Calmar 0.41, CAGR 13.82%). C'est le cas "défendable statistiquement vs équipondéré naive" mais "pas mérite inclusion vs passif simple disponible".
    - heading: "Lecture nuancée vs T1 risk parity"
      body: |
        Différent de T1 (FAIL clean dominé par 3/3 benchmarks). T2 a des points positifs réels :

        - **Sub-sample stable** : ΔSharpe -0.22 (T1 était +1.07 = bull dependency catastrophique)
        - **Capture mixed** avec 38.5% efficient (T1 sans capture portfolio-level)
        - **Bat 1 benchmark** sur Sharpe ET Calmar (equal-weight 11)

        Mais le critère plan est strict : "ne doit pas juste être défendable, doit être réellement meilleur qu'au moins 1 benchmark simple sur Sharpe ET Calmar". Equal-weight 11 sectors n'est PAS un benchmark "simple" (=  retail accessible naturellement) — SPY l'est. Et SPY domine.
    - heading: "Raison structurelle de la sous-performance vs SPY"
      body: |
        SPY est cap-weighted, dominé par mega-cap tech (AAPL/MSFT/GOOGL/NVDA/META = ~25% poids). 2019-2025 a vu un rally tech dominant (NVDA +1500%, AAPL +400%, MSFT +200%). Sector momentum top-3 picks souvent XLK + XLY + autres mais pondère 1/3 sans capter la concentration cap-weighted SP500.

        Pour battre SPY sur ce corpus, il faudrait soit (a) cap-weighted picking dans top sectors, (b) leverage tech overweight dynamiquement, (c) attendre régime bear où sector rotation defensive paye. Ces sophistications = grid search post-FAIL = interdit.
    - heading: "20e data point — pattern continue"
      body: |
        | Classe | Tests | Statut |
        |---|---:|---|
        | ICT canon-faithful | 3 | 3/3 ARCHIVED |
        | Momentum daily long-only | 2 | 2/2 ARCHIVED |
        | Directional intraday | 1 | 1/1 ARCHIVED |
        | Crypto basis/funding | 1 | 1/1 ARCHIVED |
        | Vol risk premium | 1 | 1/1 ARCHIVED |
        | Event-driven (PEAD) | 1 | 1/1 ARCHIVED |
        | Cross-asset allocation (Risk Parity) | 1 | 1/1 ARCHIVED |
        | **Cross-sectional sector momentum** | 1 | **1/1 ARCHIVED MARGINAL** |

