bloc3_structural:
  subsections:
    - heading: "Catégorie audit"
      body: |
        **WATCHLIST non-promoted** (pas STRUCTURAL_KILL absolu) — TSMOM hedgé contient un résidu positif brut +5.49%/an réel, mais ce résidu n'est :
        1. Pas statistiquement significatif (p simple 0.93, p max-stat 0.996)
        2. Pas stable cross-régime (sub-sample 2020-2022 négatif, alpha entièrement 2022-2025)
        3. Pas market-neutral propre (beta résiduel -0.145, hedge imparfait)
    - heading: "Nuance méthodologique IMPORTANTE"
      body: |
        **Le verdict ne dit PAS** "TSMOM était une illusion totale" ou "rien n'existe du tout".

        **Le verdict dit précisément** : TSMOM hedgé contient un résidu positif brut après hedge (Sharpe 0.66, alpha +5.49%/an) MAIS :
        - Ce résidu n'est pas statistiquement significatif (permutation simple ET max-stat fail)
        - Ce résidu n'est pas stable cross-régime (bull dependency 2022-2025)
        - Ce résidu ne survit pas à la correction post-hoc max-stat (selection bias parmi 5 strats)
        - Ce résidu n'est pas market-neutral propre (beta résiduel -0.145)

        Donc il est **non-promouvable per discipline Dexterio** mais pas "absolument mort".
    - heading: "Limite de la permutation simple"
      body: |
        Important caveat à documenter : shuffle TSMOM casse la relation temporelle avec SPY (qui reste fixe). La permutation génère des séries de returns avec mêmes statistiques marginales mais beta dynamique différent → la p-value 0.93 doit être interprétée prudemment.

        **Cependant** : tous les autres gates (max-stat 0.996 + sub-sample catastrophique + hedge imparfait) échouent ÉGALEMENT, donc le verdict reste **archive non-promoted** robust à cette limite.

        Si on doutait du seul gate p_simple (à cause de cette limite), on aurait quand même : sub-sample 2020-2022 Sharpe -0.14 = killer. p_maxstat 0.996 = killer. Convergence des fails = certitude qualitative.
    - heading: "Selection bias post-hoc — leçon clé"
      body: |
        Le finding TSMOM résiduel +0.66 (T_final_1) était impressionnant en isolation. Mais nous avions **sélectionné parmi 5 stratégies** post-hoc. Quand on shuffle 5 strats randomly et on prend le max résiduel Sharpe, le mean est 1.056 — soit **meilleur en moyenne** que notre TSMOM réel 0.66.

        Ça veut dire : sous l'hypothèse nulle "aucune des 5 stratégies n'a d'alpha pur", la sélection du best résiduel produit typiquement Sharpe > 1. Notre 0.66 est donc **EN DESSOUS du noise floor de selection bias**.

        **Sans correction max-stat**, on aurait pu être tenté de promote TSMOM hedgé comme "premier vrai edge du projet". La discipline plan a évité ce faux positif. **C'est une leçon méthodologique cruciale**.
    - heading: "26e data point cross-playbook"
      body: |
        TSMOM hedgé = **26e data point négatif**. Pattern empirique étendu :

        - 25 data points S+3 + S+3-bis cumulés
        - + T_final_1b TSMOM hedgé permutation FAIL
        - = **26 data points négatifs**

        14 classes d'edge testées maintenant ARCHIVED ou MARGINAL non-promoted (incluant ce TSMOM hedgé selection-bias-corrected).
    - heading: "Audit T_final_1 confirmé MAIS étendu"
      body: |
        Audit T_final_1 disait : "5 strats long-equity-biased disguised, TSMOM seul = vrai alpha pur". **Étendue T_final_1b** : TSMOM "alpha pur" était **lui-même un faux positif** issu de selection bias parmi 5 strats. Vraie conclusion :

        > **Les 5 stratégies T1 portfolio combination sont toutes du beta SPY à différents niveaux (0.35-0.86), aucune n'a d'alpha pur exploitable et statistiquement significatif sur 2020-2025.**

