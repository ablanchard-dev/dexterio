bloc3_structural:
  subsections:
    - heading: "Catégorie audit"
      body: |
        **STRUCTURAL_KILL via dominance benchmark** : Risk parity inverse-vol + vol_target 10% est mathématiquement dominé par les 3 benchmarks simples (SPY buy-hold + 60-40 + equal-weight 9 ETFs) sur tous les axes risk-adjusted (Sharpe, Calmar, CAGR).
    - heading: "Cause structurelle — vol_target overlay overcaps + bull regime dependency"
      body: |
        Le risk parity inverse-vol naturellement target ~12% vol agrégée. Vol_target overlay 10% scale BACK l'exposition → CAGR suppressed à 4.12%.

        Sans le filter vol_target, risk parity raw aurait probablement Sharpe similaire (~0.4-0.5) avec CAGR plus élevé. Mais c'est du grid search post-FAIL — interdit per discipline.

        Sub-sample révélateur : 2019-2022 Sharpe **-0.15** (négatif, COVID + 2022 bear ont détruit risk parity), 2022-2025 +0.92 (recovery). ΔSharpe +1.07 = pure dépendance régime bull. Pas robuste.

        Risk parity inverse-vol overweight low-vol assets (TLT, GLD) qui ont eu rendements négatifs/médiocres 2019-2022 (rates rising). Le portefeuille a été pénalisé par cette concentration involontaire.
    - heading: "Application lens v4 G4 (capture_summary non-applicable, métriques portfolio à la place)"
      body: |
        Risk parity = portfolio rebalancé continu (pas de trades discrets), donc capture_summary inapplicable comme prévu.

        Métriques portfolio remplacent : Calmar 0.17 (vs SPY 0.41) + ΔSharpe +1.07 (vs SPY +0.37) + DDdur 1104j (vs SPY 512j) = Risk Parity strictement worse sur les 3 axes risk-adjusted alternatifs. Documentation valide pour S+3 T2/T3 utilisation portfolio metrics quand pertinent.
    - heading: "19e data point — 7/7 classes d'edge ARCHIVED"
      body: |
        Pattern empirique étendu :

        | Classe | Tests | Statut |
        |---|---:|---|
        | ICT canon-faithful | 3 | 3/3 ARCHIVED |
        | Momentum daily long-only (J&T + TSMOM) | 2 | 2/2 ARCHIVED |
        | Directional intraday continuation | 1 | 1/1 ARCHIVED |
        | Crypto basis/funding | 1 | 1/1 ARCHIVED |
        | Vol risk premium structural | 1 | 1/1 ARCHIVED |
        | Event-driven cross-sectional (PEAD) | 1 | 1/1 ARCHIVED |
        | **Cross-asset allocation (Risk Parity)** | 1 | **1/1 ARCHIVED** |

        **7/7 classes ARCHIVED**. 19 data points cumulés. Pivot S+3 T2 + T3 reste pour confirmer/infirmer définitivement.

