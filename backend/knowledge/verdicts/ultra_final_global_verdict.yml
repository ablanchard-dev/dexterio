bloc3_structural:
  subsections:
    - heading: "Catégorisation rigoureuse demandée par user"
      body: |
        ### EDGES TESTÉS ET ÉCHOUÉS (ARCHIVE strict, pas re-test)

        **14 classes confirmées mortes sur ce périmètre** :
        1. ICT canon-faithful (3 plays)
        2. Momentum daily long-only (J&T cross-sect + TSMOM per-asset)
        3. Directional intraday continuation (Flag breakout)
        4. Crypto basis/funding harvest
        5. Vol risk premium structural (VIX VRP retail)
        6. Event-driven cross-sectional (PEAD)
        7. Cross-asset allocation (Risk Parity)
        8. Cross-sectional sector momentum
        9. Volatility anomaly (Low-Vol)
        10. Portfolio combination 5 strats T1 (selection bias confirmed)
        11. Calendar effects 4×4 (turn-of-month + day-of-week + FOMC)
        12. Intramarket SPY-QQQ differential standalone
        13. Donchian breakout per-asset (3/4 fail, 1/4 marginal BTC borderline)
        14. **EOD momentum SPY/QQQ + VIX term structure timing (Sprint Ultra-Final ajout)**

        ### EDGES NON-TESTABLES PAR CONTRAINTE DATA (deferred si data future)

        - **VIX VRP réel options-based** (vrai vol selling direct) : exige paid Polygon options chain
        - **PEAD precision earnings** (time-of-day exact + analyst revisions) : exige paid Refinitiv ou similar
        - **Microstructure intraday tick-precision** : exige paid L2 data
        - **Russell 2000 small caps cross-sectional** : data accessible yfinance mais explicitement deferred per user scope discipline
        - **Pairs trading sectorielles single-name** : data accessible mais hors scope Sprint Ultra-Final
        - **K-means + PIP novel pattern discovery** : hors scope (high data-mining risk per author quant corpus)

        ### WATCHLIST NON-PROMOTED (forward-monitor seulement)

        **3 candidats avec résidu positif brut mais non-significatif statistiquement** :

        1. **BTC Donchian breakout** (S+3-bis T4) :
           - Sharpe 0.76 vs BTC BH 0.74 (beat)
           - Permutation p=0.12 (sous gate 0.10)
           - z-score +1.23 = signal réel mais pas statistiquement clean
           - DD divisé par 1.4× (-54% vs -76%)
           - Statut : **forward-monitor 6 mois zero capital, pas re-backtest**

        2. **TSMOM hedgé β SPY 252d** (T_final_1b) :
           - Sharpe résiduel 0.66 brut
           - Max-stat permutation 0.996 = clear selection bias
           - Sub-sample 2020-2022 -0.14 négatif catastrophique
           - **Statut : non-promoted, leçon méthodologique selection bias**

        3. **Overnight drift SPY/QQQ buy-hold** (incidental finding T_final_2) :
           - Sharpe 1.07 (SPY) / 1.22 (QQQ) sur 1.9y
           - Documenté académiquement (Knuteson 2018, Cliff-Cooper-Gulen 2008)
           - Mécanisme economic (close auction, gamma hedging) connu
           - **Statut : non-actionnable direct retail (exige execution close-to-open friction-light), mais effect réel à monitorer**

        ### DÉCISION SPRINT 4 PRODUCTION/R&D

        **Production arm** : Sprint 4 Paper Baseline IBKR avec **TSMOM Moskowitz publique exact** sur SPY/QQQ/GLD/TLT.
        - Stratégie publique académique connue, no custom edge claim
        - But : valider pipeline live (slippage réel + broker behavior + DST + reconnect + monitoring)
        - 5-7j Sprint 4 budget
        - Coût $0
        - Justifié comme **fallback discipliné assumé** post-29-data-points-convergents

        **R&D arm** (asynchrone, parallèle) : continue
        - BTC Donchian forward-monitor 6 mois
        - Nouveaux edges externes papers SSRN/arXiv future ideas
        - Pas paid data automatique
        - Pas prop firm sans edge validé
    - heading: "Conclusion empirique inattaquable post 29 data points"
      body: |
        > **Sur le périmètre testé (free retail data + univers US/crypto majeurs liquides + edges publics documentés simple equal-weight retail), 14/14 classes d'edge ARCHIVED. Aucune stratégie ne franchit gates Dexterio (Sharpe + permutation + dominance benchmark + sub-sample).**

        Ce **n'est PAS** :
        - "Aucun edge n'existe nulle part dans le ciel financier"
        - "DexterioBOT est inutile"
        - "L'infra n'a pas de valeur"

        Ce **EST** :
        - Périmètre free retail saturated empiriquement
        - 14/14 publics retail equal-weight dead sur 2019-2025/2024-2026 corpus testés
        - Edge privé reste possible via : transformation propriétaire / matching asset spécifique / forward monitoring / paid data sur hypothèse pré-spec / prop firm leverage post-edge / academic external research hors corpus YouTube
    - heading: "Leçons méthodologiques acquises (réutilisables S+4+)"
      body: |
        1. **Beta-neutralization comme test diagnostic** : isoler alpha pur post β SPY révèle si signal = alpha vrai ou beta déguisé. Standard désormais pour tout signal "long-bias suspecté"
        2. **Permutation max-stat / family-wise** : correction selection bias quand "best of N" examiné. SANS cette correction, T_final_1 nous aurait fait promote TSMOM hedgé qui était noise. Standard pour tout finding "best parmi plusieurs"
        3. **Hedge cost realistic** : beta change turnover cost daily, pas zéro. Important pour valider si hedge pratique
        4. **Data gate strict pre-test** : skip cleanly si data insuffisante, pas proxy contamination (T_final_2 surprise PASS data gate avec 469 sessions au lieu d'attendu skip)
        5. **Overnight drift incidental finding académique** : à noter même si non-actionnable direct, peut informer Stage 4 paper monitor

