bloc3_structural:
  subsections:
    - heading: "Catégorie audit (§18.3 v4)"
      body: |
        **STRUCTURAL_KILL via capacity decay confirmé empiriquement** — pas FANTASY (vraie implémentation Bernard & Thomas 1989/1990 canonique : top-decile EPS surprise quarterly cohort, hold 60d, equal-weight portfolio). Pas PARTIAL_IMPL (briques providers + earnings + portfolio aggregation complets). C'est une stratégie correctement codée et correctement testée qui se révèle non-extractible en portfolio sur SP500 free retail data 2019-2025.
    - heading: "Diagnostic clé : per-event +6% mais portfolio Sharpe 0.03 — paradoxe résolu"
      body: |
        **Le PEAD signal existe per-event mais ne survit pas à l'aggregation portfolio** :

        - Mean realized return per event V1 = **+6.10%** (60d hold) → annualisé ~24% si capturable
        - Median capture_ratio = +0.636 → median per-event return ~0.64% (tiny)
        - Distribution **massivement skewed** : ~10% des events font +20-50%, majorité fait +/-1-3%

        Aggregation equal-weight portfolio (587 events / 6.3y × 60d hold = ~23 positions overlap concurrentes) **dilue le mean dans le median**. Daily portfolio return moyen ~0.01-0.02% net = Sharpe 0.03.

        C'est la **capacity decay académique du PEAD** : Bernard & Thomas 1989-1990 ont mesuré +5-10% drift exploitable dans un marché moins efficient. Sur 2019-2025, le drift moyen reste positif (+6%) mais devient **non-extractible portfolio** par dilution + corrélation avec beta SP500 (toutes positions long sont longues SP500 beta).
    - heading: "Bottom-decile drift UP — pas down — = inversion classique"
      body: |
        V3 short-side (bottom-decile EPS surprises) : mean realized_ret = **+4.32%** (long-equivalent return). Cela signifie : short-seller perd -4.32% mean sur ces "negative surprise" events.

        **Bernard & Thomas avaient documenté** : top-decile drift up 5%, bottom-decile drift down 5%, spread 10%. Sur 2019-2025 : top-decile drift up 6%, **bottom-decile drift up AUSSI 4.3%**. Le spread (long-short edge) est **+1.7%** au lieu de **+10%**.

        Cause probable : (1) capacity arbitrage des hedge funds short-selling negative surprises, (2) bear market 2022 où "negative surprise" stocks ont rebound, (3) survivorship bias current SP500 (les vraiment mauvais sont sortis de l'index).

        Conclusion : V3 long-short est mort par compression différentielle des deux côtés.
    - heading: "Capture analysis V3 short = exit_broken_too_late confirme"
      body: |
        Headline `exit_broken_too_late` 39.9% sur short-side. Signifie : 40% des short positions ont eu un peak excursion (price drop) puis reversed avant le 60d exit. Le drift bottom-decile down existe à court terme mais reverse → long-only directionnel survit pas.

        Pas un problème "exit fix" (pas de SL/TP à calibrer en PEAD academic). C'est structurel : le pattern bottom-decile drift down est déformé sur ce corpus.
    - heading: "Sub-sample 2019-2022 vs 2022-2025 — décélération continue"
      body: |
        V1 ΔSharpe **-0.42** (de +0.27 à -0.15). Edge marginal qui restait en 2019-2022 (Sharpe positif modeste) **disparaît** en 2022-2025. Pattern : capacity arbitrage continue, le PEAD edge décroît graduellement.

        V3 négatif sur les 2 sous-périodes (Sharpe -3.48 puis -4.16). Pas de fenêtre où V3 a fonctionné.

        Confirme : pas une fenêtre lucky/unlucky. Le PEAD long-only est **structurellement insuffisant** sur SP500 2019-2025 free data, le PEAD long-short est **structurellement négatif**.
    - heading: "18e data point négatif — 6/6 classes d'edge ARCHIVED"
      body: |
        Pattern empirique complet sur DexterioBOT 2025-2026 free data + retail US/crypto majeurs liquides :

        | Classe | Tests | Statut |
        |---|---:|---|
        | ICT canon-faithful (post-§0.B) | 3 | 3/3 ARCHIVED |
        | Momentum daily long-only (J&T + TSMOM) | 2 | 2/2 ARCHIVED (permutation FAIL) |
        | Directional intraday continuation (Flag) | 1 | 1/1 ARCHIVED |
        | Crypto basis/funding harvest | 1 | 1/1 ARCHIVED |
        | Vol risk premium structural (VIX VRP) | 1 | 1/1 ARCHIVED (dominé par SPY) |
        | **Event-driven cross-sectional (PEAD)** | 1 | **1/1 ARCHIVED (capacity decay + dominé par SPY)** |

        **6/6 classes ARCHIVED**. Conclusion empirique structurelle confirmée : le périmètre testé (free data + retail US/crypto majeurs liquides + universe SP500 current) est **entièrement saturé** pour les classes d'edge publics documentés académiquement.

bloc4_decision:
  body: |
    **PEAD V1/V2/V3 = ARCHIVED clean** par discipline plan S+2.

    3/3 variantes FAIL convergent 4 gates (Sharpe ≥0.5, Sharpe ≥0.8, DD ≥-20%, dominance SPY ref). Permutation test skipped (gates clean enough sans ce 3e angle).

    **18e data point négatif. 6/6 classes d'edge testées ARCHIVED.**

    **Diagnostic non-trivial à retenir** : PEAD signal existe per-event (+6.10% mean realized) mais **non-extractible portfolio** (Sharpe 0.03 par dilution + skewness + beta SP500). C'est différent de "no signal" — c'est "signal présent mais non-tradable retail equal-weight". Pour exploiter PEAD modernement il faudrait : (a) vol-targeting per position, (b) skewness-aware sizing (Kelly partial), (c) hedge SP500 beta dynamic, (d) filter stricter que decile naive.

    Mais ces sophistications = **grid search** post-FAIL = interdit per discipline plan. Si user veut explorer PEAD sophistiqué, c'est un nouveau plan, pas un re-test post-archive.

    **Pivot S+3 obligatoire** per branching pré-écrit S+2 amendment. 2 options réelles :
    - **Branche A** : Russell 2000 cross-sectional (universe less arbitrated)
    - **Branche D** : Pivot fondamental projet (paid data Polygon / prop firm / accept role infra-only)

